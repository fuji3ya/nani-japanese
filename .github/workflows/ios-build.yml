name: iOS compile gate

# Two jobs, both on a public repo (unlimited free macOS minutes, no EAS):
#   simulator-build  - unsigned compile gate, runs on every push. Catches
#                      native/RN compile errors tsc + vitest can't.
#   signed-build     - signed archive -> IPA -> TestFlight. Manual dispatch
#                      only (needs the signing secrets + ASC app record).
# Proven config copied from the ibiki / うちのモん SDK56 builds (same Expo
# SDK56 / RN 0.85 stack): macos-26 + newest Xcode (Swift 6.2),
# pod install --repo-update, scheme via `xcodebuild -list -json`.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      upload_testflight:
        description: "Upload the signed build to TestFlight"
        type: boolean
        default: true

jobs:
  simulator-build:
    name: iPhone Simulator Build (compile gate)
    runs-on: macos-26
    timeout-minutes: 60
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select newest Xcode (Expo SDK56 'apple' SPM pkg needs Swift 6.2)
        run: |
          set -euo pipefail
          LATEST=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -z "$LATEST" ]; then LATEST=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Using $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Type-check (tsc) + unit tests (vitest)
        run: |
          npx tsc --noEmit
          npx vitest run

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Resolve workspace and scheme
        id: xc
        run: |
          set -euo pipefail
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          # The app scheme == the .xcodeproj name. Do NOT use schemes[0]: the
          # workspace lists Pod schemes too (EXConstants etc.) and [0] picks the
          # alphabetically-first one, which archives a pod, not the app.
          SCHEME=$(basename "$(ls -d ios/*.xcodeproj | head -1)" .xcodeproj)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Resolved workspace=$WORKSPACE scheme=$SCHEME"

      - name: Build for simulator (compile only, generic destination)
        run: |
          set -o pipefail
          xcodebuild \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            build | tee xcodebuild.log

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nani-sim-log
          path: xcodebuild.log

  signed-build:
    name: Signed Archive + TestFlight
    runs-on: macos-26
    timeout-minutes: 90
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select newest Xcode (iOS 26 SDK required by App Store)
        run: |
          set -euo pipefail
          LATEST=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -z "$LATEST" ]; then LATEST=$(ls -d /Applications/Xcode*.app | sort -V | tail -1); fi
          echo "Using $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Write build-time env (RevenueCat public SDK key)
        env:
          EXPO_PUBLIC_RC_API_KEY_IOS: ${{ vars.EXPO_PUBLIC_RC_API_KEY_IOS }}
        run: |
          set -euo pipefail
          # EXPO_PUBLIC_* vars are inlined into the JS bundle by Metro from .env files.
          # Write .env.local so the RevenueCat key is baked into the archive's JS bundle.
          if [ -n "${EXPO_PUBLIC_RC_API_KEY_IOS:-}" ]; then
            echo "EXPO_PUBLIC_RC_API_KEY_IOS=${EXPO_PUBLIC_RC_API_KEY_IOS}" >> .env.local
            echo "Wrote EXPO_PUBLIC_RC_API_KEY_IOS (appl_) to .env.local"
          else
            echo "::warning::EXPO_PUBLIC_RC_API_KEY_IOS var is empty - build will run in RC mock mode"
          fi

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Resolve workspace and scheme
        id: xc
        run: |
          set -euo pipefail
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          # The app scheme == the .xcodeproj name. Do NOT use schemes[0]: the
          # workspace lists Pod schemes too (EXConstants etc.) and [0] picks the
          # alphabetically-first one, which archives a pod, not the app.
          SCHEME=$(basename "$(ls -d ios/*.xcodeproj | head -1)" .xcodeproj)
          echo "workspace=$WORKSPACE" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          echo "Installed provisioning profile UUID: $UUID"

      - name: Archive (signed)
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -o pipefail
          PLIST=$(find ios -maxdepth 2 -name Info.plist -not -path "*/Pods/*" | head -1)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUMBER" "$PLIST"
          xcodebuild \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Nani.xcarchive" \
            -skipPackagePluginValidation \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=YXFS993Z4K \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Nani App Store Profile" \
            archive | tee archive.log

      - name: Export IPA (exportArchive, fallback to manual package)
        run: |
          set -o pipefail
          # Newer Xcode (26.5) hits IDEDistribution "Unknown Distribution Error"
          # (methods list empty -> "expected one {}"). The archive is already
          # signed for App Store, so fall back to packaging Payload/*.app -> .ipa.
          if xcodebuild -exportArchive \
               -archivePath "$RUNNER_TEMP/Nani.xcarchive" \
               -exportOptionsPlist ExportOptions.plist \
               -exportPath "$RUNNER_TEMP/export" \
               -allowProvisioningUpdates 2>&1 | tee export.log \
             && ls "$RUNNER_TEMP"/export/*.ipa >/dev/null 2>&1; then
            echo "exportArchive succeeded"
          else
            echo "exportArchive failed -> packaging IPA manually from the signed archive"
            APP=$(ls -d "$RUNNER_TEMP/Nani.xcarchive/Products/Applications/"*.app | head -1)
            echo "App bundle: $APP"
            rm -rf "$RUNNER_TEMP/export"
            mkdir -p "$RUNNER_TEMP/export/Payload"
            cp -R "$APP" "$RUNNER_TEMP/export/Payload/"
            ( cd "$RUNNER_TEMP/export" && zip -qry Nani.ipa Payload )
          fi
          ls -la "$RUNNER_TEMP/export"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: nani-ipa
          path: ${{ runner.temp }}/export/*.ipa

      - name: Upload to TestFlight
        if: inputs.upload_testflight
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/private_keys"
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$HOME/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
          IPA=$(ls "$RUNNER_TEMP"/export/*.ipa | head -1)
          xcrun altool --upload-app -f "$IPA" -t ios --apiKey "$ASC_API_KEY_ID" --apiIssuer "$ASC_API_ISSUER_ID"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nani-signed-logs
          path: |
            archive.log
            export.log
